<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>Password Generator</h1>

    <div class="generator-box">

      <input type="text" id="password" readonly placeholder="Generated Password">

      <button id="copyBtn">Copy</button>

      <div class="length-box">
        <label>Password Length:</label>
        <input type="number" id="length" min="4" max="50" value="12">
      </div>

      <div class="options">

        <label>
          <input type="checkbox" id="uppercase">
          Uppercase
        </label>

        <label>
          <input type="checkbox" id="lowercase" checked>
          Lowercase
        </label>

        <label>
          <input type="checkbox" id="numbers">
          Numbers
        </label>

        <label>
          <input type="checkbox" id="symbols">
          Symbols
        </label>

      </div>

      <button id="generateBtn">Generate Password</button>

      <div class="strength">
        Strength:
        <span id="strengthText">None</span>
      </div>

      <div class="save-box">
        <input type="text" id="label" placeholder="Optional Label">
        <button id="saveBtn">Save Password</button>
      </div>

      <p id="message"></p>

    </div>

    <div class="saved-passwords">

      <h2>Saved Passwords</h2>

      <input type="text" id="search" placeholder="Search passwords...">

      <div id="passwordList"></div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
