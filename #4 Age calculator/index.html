<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Age Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <div class="card">

      <h1>Age Calculator</h1>

      <label>Select Your Birth Date</label>

      <input type="date" id="birthDate">

      <button id="calculateBtn">
        Calculate Age
      </button>

      <p id="message"></p>

      <div class="result">

        <div class="box">
          <h2 id="years">0</h2>
          <p>Years</p>
        </div>

        <div class="box">
          <h2 id="months">0</h2>
          <p>Months</p>
        </div>

        <div class="box">
          <h2 id="days">0</h2>
          <p>Days</p>
        </div>

      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
