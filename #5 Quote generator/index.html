<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Quote Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <div class="card">

      <h1>Random Quote Generator</h1>

      <div class="quote-box">

        <p id="quote">
          Click the button to generate a quote
        </p>

        <h3 id="author"></h3>

      </div>

      <div class="buttons">

        <button id="generateBtn">
          New Quote
        </button>

        <button id="copyBtn">
          Copy Quote
        </button>

        <button id="saveBtn">
          Save Favorite
        </button>

      </div>

      <p id="message"></p>

    </div>

    <div class="favorites">

      <h2>Favorite Quotes</h2>

      <div id="favoriteList"></div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
